# ============================================================
# deploy/nginx.conf — Nginx reverse proxy configuration
# ============================================================
# Nginx sits in front of your FastAPI server.
# Instead of users calling port 8000 directly,
# they call port 80 (HTTP) → Nginx forwards it to port 8000.
#
# Benefits:
#   - Standard port 80 (users don't need to type :8000)
#   - Can add HTTPS/SSL later with Let's Encrypt
#   - Handles large file uploads
#   - Serves static files efficiently
#
# HOW TO INSTALL (on server):
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/syntra
#   sudo ln -s /etc/nginx/sites-available/syntra \
#              /etc/nginx/sites-enabled/syntra
#   sudo nginx -t              ← test config for errors
#   sudo systemctl reload nginx
# ============================================================

server {
    listen 80;

    # Replace with your server's IP or domain name
    # Example with IP:     server_name 108.181.168.43;
    # Example with domain: server_name api.syntra.com;
    server_name 108.181.168.43;

    # ── Increase max upload size ────────────────────────────
    # Screenshots can be a few MB each. Default is 1M which is too small.
    client_max_body_size 20M;

    # ── Forward all requests to FastAPI ────────────────────
    location / {
        # Pass the request to uvicorn running on port 8000
        proxy_pass         http://127.0.0.1:8000;

        # These headers tell FastAPI the real client IP and protocol
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts: give FastAPI up to 60s to respond
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
