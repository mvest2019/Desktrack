# ============================================================
# deploy/nginx.conf — Single-server setup
# ============================================================
# Both frontend and backend run on the SAME server:
#
#   Port 80  (this block) → Next.js frontend  (port 3000)
#   Port 8000 (direct)    → FastAPI backend    (uvicorn)
#
# The browser opens:  http://108.181.168.43        (frontend)
# The API is at:      http://108.181.168.43:8000   (backend)
# The desktop app talks directly to port 8000.
#
# HOW TO INSTALL (on server):
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/syntra
#   sudo ln -s /etc/nginx/sites-available/syntra \
#              /etc/nginx/sites-enabled/syntra
#   sudo rm -f /etc/nginx/sites-enabled/default   ← remove default site
#   sudo nginx -t              ← test config for errors
#   sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    server_name 108.181.168.43;

    # ── Forward all browser requests to Next.js (port 3000) ─
    location / {
        proxy_pass         http://127.0.0.1:3000;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Next.js needs these for hot-reload websocket (dev mode)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}

# ── The FastAPI backend stays on port 8000 (direct) ─────────
# No nginx block needed for it — uvicorn listens on 0.0.0.0:8000
# and the firewall already allows port 8000.
# Access it at: http://108.181.168.43:8000/docs
